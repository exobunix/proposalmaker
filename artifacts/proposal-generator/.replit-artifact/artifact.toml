kind = "web"
previewPath = "/"
title = "AI Proposal Generator"
version = "1.0.0"
id = "artifacts/proposal-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25931

[services.development]
run = "pnpm --filter @workspace/proposal-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proposal-generator", "run", "build" ]
publicDir = "artifacts/proposal-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25931"
BASE_PATH = "/"
